<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Smart E-Aadhar Print</title>

    <!-- PDF.js for reading E-Aadhar securely in browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1e1e2e; color: #cdd6f4; padding: 20px; text-align: center; margin: 0; }
        
        .admin-panel { max-width: 800px; margin: auto; background: #313244; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #a6e3a1; margin-top: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .badge { background: #f38ba8; color: #11111b; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 10px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        input[type="file"] { display: none; }
        .upload-btn { background: #89b4fa; color: #11111b; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; }
        .upload-btn:hover { background: #74a1f9; }
        
        input[type="text"] { padding: 12px; border-radius: 6px; border: 1px solid #45475a; background: #11111b; color: white; flex: 1; font-size: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        input[type="text"]::placeholder { color: #6c7086; letter-spacing: normal; font-weight: normal; }

        button.action-btn { background: #a6e3a1; color: #11111b; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 15px; transition: 0.3s; }
        button.action-btn:hover { background: #94d68f; }
        button.print-btn { background: #fab387; margin-top: 15px; display: none; }

        .status { color: #f9e2af; font-weight: bold; margin-bottom: 15px; display: none; }

        /* Preview Area */
        .preview-wrapper { background: white; padding: 10px; border-radius: 4px; overflow: auto; max-height: 500px; display: none; }
        #printCanvas { max-width: 100%; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* 🔥 CSS FOR PRINTING 🔥 */
        @media print {
            body * { visibility: hidden; }
            .preview-wrapper, .preview-wrapper * { visibility: visible; }
            .preview-wrapper { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; max-height: none; background: none; }
            #printCanvas { width: 210mm; height: 297mm; border: none; box-shadow: none; object-fit: contain; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>E-Aadhar Auto-Cutter <span class="badge">ADMIN ONLY</span></h2>
    <p style="font-size: 13px; color: #a6adc8; margin-bottom: 20px;">Exact Match. Solid Black Rectangle. Perfect Native Crop.</p>

    <div class="input-group">
        <label class="upload-btn">
            📂 1. Select E-Aadhar PDF
            <input type="file" id="fileInput" accept="application/pdf">
        </label>
        <input type="text" id="pdfPassword" placeholder="PDF Password (e.g. KHUS2003)">
    </div>

    <div id="statusText" class="status">🔄 Extracting & Cropping... Please wait.</div>

    <button id="processBtn" class="action-btn" onclick="processAadhar()">✂️ 2. Auto-Crop & Arrange</button>

    <button id="printBtn" class="action-btn print-btn" onclick="window.print()">🖨️ 3. Print on A4 Glossy Paper</button>

    <div class="preview-wrapper" id="previewArea">
        <!-- Canvas represents an A4 size page at 300 DPI -->
        <canvas id="printCanvas" width="2480" height="3508"></canvas>
    </div>
</div>

<script>
    let rawImageCanvas = document.createElement('canvas'); 
    let rawCtx = rawImageCanvas.getContext('2d');
    
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusText = document.getElementById('statusText');
    const previewArea = document.getElementById('previewArea');
    const printBtn = document.getElementById('printBtn');
    
    // A4 Standard Dimensions (300 DPI)
    const A4_WIDTH = 2480;
    const A4_HEIGHT = 3508;
    const printCanvas = document.getElementById('printCanvas');
    const printCtx = printCanvas.getContext('2d');

    async function processAadhar() {
        const file = fileInput.files[0];
        if (!file) {
            alert("Please select an E-Aadhar PDF first!");
            return;
        }

        statusText.style.display = "block";
        processBtn.disabled = true;

        try {
            if (file.type === "application/pdf") {
                await loadPDF(file);
            } else {
                throw new Error("Invalid file type. Please upload the E-Aadhar PDF.");
            }
            
            drawFinalA4();

            statusText.style.display = "none";
            previewArea.style.display = "block";
            printBtn.style.display = "block";
            processBtn.innerText = "✓ Perfect Joint Crop Applied!";
            processBtn.style.background = "#6c7086";

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message + "\n(If it's a PDF, make sure the password is correct!)");
            statusText.style.display = "none";
        } finally {
            processBtn.disabled = false;
        }
    }

    async function loadPDF(file) {
        const password = document.getElementById('pdfPassword').value.trim();
        const fileReader = new FileReader();

        return new Promise((resolve, reject) => {
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const loadingTask = pdfjsLib.getDocument({ data: typedarray, password: password });
                    const pdf = await loadingTask.promise;
                    
                    const page = await pdf.getPage(1);
                    
                    const scale = 4.0; 
                    const viewport = page.getViewport({ scale: scale });
                    
                    rawImageCanvas.width = viewport.width;
                    rawImageCanvas.height = viewport.height;
                    
                    const renderContext = { canvasContext: rawCtx, viewport: viewport };
                    await page.render(renderContext).promise;
                    resolve();
                } catch (err) {
                    reject(new Error(err.name === "PasswordException" ? "Incorrect PDF Password!" : err.message));
                }
            };
            fileReader.readAsArrayBuffer(file);
        });
    }

    function drawFinalA4() {
        // Clear A4 Canvas and make it white
        printCtx.fillStyle = "#FFFFFF";
        printCtx.fillRect(0, 0, A4_WIDTH, A4_HEIGHT);

        const rw = rawImageCanvas.width;
        const rh = rawImageCanvas.height;

        // 🔥 RESTORED THE EXACT MATHEMATICAL SWEET SPOT 🔥
        // This targets ONLY the bottom pocket card perfectly.
        const frontCropX = rw * 0.038; 
        const backCropX  = rw * 0.515;

        const cropY = rh * 0.688; // Starts right below the scissor line
        const cropW = rw * 0.445;
        const cropH = rh * 0.285; // Captures exactly down to the bottom border 

        // Size configuration (Maintains aspect ratio, NO squishing)
        const targetW = 1004;
        const targetH = targetW * (cropH / cropW); 

        // Auto-center on A4
        const marginX = (A4_WIDTH - (targetW * 2)) / 2; 
        const marginY = 250; 

        try {
            // Draw Front Side (Left)
            printCtx.drawImage(
                rawImageCanvas, 
                frontCropX, cropY, cropW, cropH, 
                marginX, marginY, targetW, targetH 
            );

            // Draw Back Side (Right) - Attached directly to Front!
            printCtx.drawImage(
                rawImageCanvas, 
                backCropX, cropY, cropW, cropH, 
                marginX + targetW, marginY, targetW, targetH 
            );

            // 🔥 Draw SOLID BLACK OUTSIDE BOX (Clean Border) 🔥
            printCtx.strokeStyle = "#000000"; 
            printCtx.lineWidth = 4; // Thick solid line 
            printCtx.setLineDash([]); // No dashes
            printCtx.strokeRect(marginX, marginY, targetW * 2, targetH);
            
            // 🔥 Draw SOLID BLACK FOLDING LINE (Center Line) 🔥
            printCtx.lineWidth = 2; // Slightly thinner for the exact center fold
            printCtx.beginPath();
            printCtx.moveTo(marginX + targetW, marginY);
            printCtx.lineTo(marginX + targetW, marginY + targetH);
            printCtx.stroke();

        } catch (e) {
            console.error("Cropping boundary error.", e);
        }
    }
</script>

</body>
</html>
