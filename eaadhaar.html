<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Smart E-Aadhar Print</title>

    <!-- PDF.js for reading E-Aadhar securely in browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    </script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1e1e2e; color: #cdd6f4; padding: 20px; text-align: center; margin: 0; }
        
        .admin-panel { max-width: 800px; margin: auto; background: #313244; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #a6e3a1; margin-top: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .badge { background: #f38ba8; color: #11111b; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; vertical-align: middle; margin-left: 10px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        input[type="file"] { display: none; }
        .upload-btn { background: #89b4fa; color: #11111b; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; }
        .upload-btn:hover { background: #74a1f9; }
        
        input[type="text"] { padding: 12px; border-radius: 6px; border: 1px solid #45475a; background: #11111b; color: white; flex: 1; font-size: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        input[type="text"]::placeholder { color: #6c7086; letter-spacing: normal; font-weight: normal; }

        button.action-btn { background: #a6e3a1; color: #11111b; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 15px; transition: 0.3s; }
        button.action-btn:hover { background: #94d68f; }
        button.action-btn:disabled { background: #45475a; color: #9399b2; cursor: not-allowed; }
        button.print-btn { background: #fab387; margin-top: 15px; display: none; }
        button.secondary-btn { background: #f38ba8; }
        button.secondary-btn:hover { background: #e57a99; }

        .status { color: #f9e2af; font-weight: bold; margin-bottom: 15px; display: none; }
        .instruction { color: #89dceb; font-weight: bold; margin-bottom: 10px; display: none; font-size: 15px; }

        /* Calibration (manual crop) area */
        .calib-wrapper { background: #11111b; padding: 10px; border-radius: 4px; display: none; margin-bottom: 15px; }
        #calibCanvas { max-width: 100%; border: 1px dashed #89b4fa; cursor: crosshair; }
        .calib-buttons { display: flex; gap: 10px; margin-bottom: 15px; display: none; }
        .calib-buttons button { flex: 1; margin-bottom: 0; }

        /* Preview Area */
        .preview-wrapper { background: white; padding: 10px; border-radius: 4px; overflow: auto; max-height: 500px; display: none; }
        #printCanvas { max-width: 100%; border: 1px solid #ccc; box-shadow: 0 0 10px rgba(0,0,0,0.1); }

        /* 🔥 CSS FOR PRINTING 🔥 */
        @media print {
            body * { visibility: hidden; }
            .preview-wrapper, .preview-wrapper * { visibility: visible; }
            .preview-wrapper { position: absolute; left: 0; top: 0; width: 100%; padding: 0; margin: 0; max-height: none; background: none; }
            #printCanvas { width: 210mm; height: 297mm; border: none; box-shadow: none; object-fit: contain; }
            @page { size: A4; margin: 0; }
        }
    </style>
</head>
<body>

<div class="admin-panel">
    <h2>E-Aadhar Auto-Cutter <span class="badge">ADMIN ONLY</span></h2>
    <p style="font-size: 13px; color: #a6adc8; margin-bottom: 20px;">Manual Select Crop. Stretch-to-Fill. Scissor Line Included.</p>

    <div class="input-group">
        <label class="upload-btn">
            📂 1. Select E-Aadhar PDF
            <input type="file" id="fileInput" accept="application/pdf">
        </label>
        <input type="text" id="pdfPassword" placeholder="PDF Password (e.g. KHUS2003)">
    </div>

    <div id="statusText" class="status">🔄 Extracting PDF page... Please wait.</div>

    <button id="processBtn" class="action-btn" onclick="loadAndCalibrate()">📄 2. Load PDF &amp; Select Crop Area</button>

    <div id="instructionText" class="instruction">
        ✂️ Mouse se drag karke <b>FRONT</b> card (photo wala part) ke around box banayein
    </div>

    <div class="calib-wrapper" id="calibWrapper">
        <canvas id="calibCanvas"></canvas>
    </div>

    <div class="calib-buttons" id="calibButtons">
        <button class="action-btn secondary-btn" onclick="resetSelection()">↺ Reset Selection</button>
        <button id="generateBtn" class="action-btn" onclick="drawFinalA4()" disabled>✂️ 3. Generate &amp; Arrange</button>
    </div>

    <button id="printBtn" class="action-btn print-btn" onclick="window.print()">🖨️ 4. Print on A4 Glossy Paper</button>

    <div class="preview-wrapper" id="previewArea">
        <!-- Canvas represents an A4 size page at 300 DPI -->
        <canvas id="printCanvas" width="2480" height="3508"></canvas>
    </div>
</div>

<script>
    let rawImageCanvas = document.createElement('canvas'); 
    let rawCtx = rawImageCanvas.getContext('2d');
    
    const fileInput = document.getElementById('fileInput');
    const processBtn = document.getElementById('processBtn');
    const statusText = document.getElementById('statusText');
    const instructionText = document.getElementById('instructionText');
    const previewArea = document.getElementById('previewArea');
    const printBtn = document.getElementById('printBtn');
    const calibWrapper = document.getElementById('calibWrapper');
    const calibCanvas = document.getElementById('calibCanvas');
    const calibCtx = calibCanvas.getContext('2d');
    const calibButtons = document.getElementById('calibButtons');
    const generateBtn = document.getElementById('generateBtn');

    // A4 Standard Dimensions (300 DPI)
    const A4_WIDTH = 2480;
    const A4_HEIGHT = 3508;
    const printCanvas = document.getElementById('printCanvas');
    const printCtx = printCanvas.getContext('2d');

    // Manual crop selection state
    const DISPLAY_WIDTH = 760; // fixed display width for calibration canvas
    let displayScale = 1;       // raw px per display px
    let mode = 'front';         // 'front' -> 'back' -> 'done'
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let frontRect = null;       // {x,y,w,h} in RAW canvas coordinates
    let backRect = null;        // {x,y,w,h} in RAW canvas coordinates
    let currentRectDisplay = null; // live rectangle while dragging (display coords)

    async function loadAndCalibrate() {
        const file = fileInput.files[0];
        if (!file) {
            alert("Please select an E-Aadhar PDF first!");
            return;
        }
        if (file.type !== "application/pdf") {
            alert("Invalid file type. Please upload the E-Aadhar PDF.");
            return;
        }

        statusText.style.display = "block";
        processBtn.disabled = true;
        previewArea.style.display = "none";
        printBtn.style.display = "none";

        try {
            await loadPDF(file);
            setupCalibrationCanvas();

            statusText.style.display = "none";
            calibWrapper.style.display = "block";
            calibButtons.style.display = "flex";
            instructionText.style.display = "block";
            resetSelection(); // resets mode to 'front' and redraws
            processBtn.innerText = "✓ PDF Loaded — ab crop select karein neeche";
            processBtn.style.background = "#6c7086";

        } catch (error) {
            console.error(error);
            alert("Error: " + error.message + "\n(If it's a PDF, make sure the password is correct!)");
            statusText.style.display = "none";
        } finally {
            processBtn.disabled = false;
        }
    }

    async function loadPDF(file) {
        const password = document.getElementById('pdfPassword').value.trim();
        const fileReader = new FileReader();

        return new Promise((resolve, reject) => {
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const loadingTask = pdfjsLib.getDocument({ data: typedarray, password: password });
                    const pdf = await loadingTask.promise;
                    
                    const page = await pdf.getPage(1);
                    
                    const scale = 4.0; 
                    const viewport = page.getViewport({ scale: scale });
                    
                    rawImageCanvas.width = viewport.width;
                    rawImageCanvas.height = viewport.height;
                    
                    const renderContext = { canvasContext: rawCtx, viewport: viewport };
                    await page.render(renderContext).promise;
                    resolve();
                } catch (err) {
                    reject(new Error(err.name === "PasswordException" ? "Incorrect PDF Password!" : err.message));
                }
            };
            fileReader.readAsArrayBuffer(file);
        });
    }

    function setupCalibrationCanvas() {
        const rw = rawImageCanvas.width;
        const rh = rawImageCanvas.height;
        displayScale = rw / DISPLAY_WIDTH;
        calibCanvas.width = DISPLAY_WIDTH;
        calibCanvas.height = Math.round(rh / displayScale);
        redrawCalibCanvas();
    }

    function redrawCalibCanvas() {
        // Draw the scaled-down full page
        calibCtx.drawImage(rawImageCanvas, 0, 0, rawImageCanvas.width, rawImageCanvas.height,
                            0, 0, calibCanvas.width, calibCanvas.height);

        // Draw already-confirmed rectangles
        if (frontRect) drawDisplayRect(toDisplayRect(frontRect), "#a6e3a1", "FRONT");
        if (backRect) drawDisplayRect(toDisplayRect(backRect), "#89b4fa", "BACK");

        // Draw the rectangle currently being dragged
        if (currentRectDisplay) {
            const color = (mode === 'front') ? "#a6e3a1" : "#89b4fa";
            drawDisplayRect(currentRectDisplay, color, mode.toUpperCase());
        }
    }

    function drawDisplayRect(rect, color, label) {
        calibCtx.strokeStyle = color;
        calibCtx.lineWidth = 2;
        calibCtx.strokeRect(rect.x, rect.y, rect.w, rect.h);
        calibCtx.fillStyle = color;
        calibCtx.font = "bold 14px sans-serif";
        calibCtx.fillText(label, rect.x + 4, rect.y + 16);
    }

    function toDisplayRect(rawRect) {
        return {
            x: rawRect.x / displayScale,
            y: rawRect.y / displayScale,
            w: rawRect.w / displayScale,
            h: rawRect.h / displayScale
        };
    }

    function toRawRect(dispRect) {
        return {
            x: dispRect.x * displayScale,
            y: dispRect.y * displayScale,
            w: dispRect.w * displayScale,
            h: dispRect.h * displayScale
        };
    }

    function getCanvasPos(evt) {
        const rect = calibCanvas.getBoundingClientRect();
        const scaleX = calibCanvas.width / rect.width;
        const scaleY = calibCanvas.height / rect.height;
        const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
        const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    function startDrag(evt) {
        if (mode === 'done') return;
        evt.preventDefault();
        const pos = getCanvasPos(evt);
        isDragging = true;
        dragStartX = pos.x;
        dragStartY = pos.y;
        currentRectDisplay = { x: pos.x, y: pos.y, w: 0, h: 0 };
    }

    function moveDrag(evt) {
        if (!isDragging) return;
        evt.preventDefault();
        const pos = getCanvasPos(evt);
        currentRectDisplay = {
            x: Math.min(dragStartX, pos.x),
            y: Math.min(dragStartY, pos.y),
            w: Math.abs(pos.x - dragStartX),
            h: Math.abs(pos.y - dragStartY)
        };
        redrawCalibCanvas();
    }

    function endDrag(evt) {
        if (!isDragging) return;
        isDragging = false;
        if (!currentRectDisplay || currentRectDisplay.w < 5 || currentRectDisplay.h < 5) {
            currentRectDisplay = null;
            redrawCalibCanvas();
            return;
        }

        const raw = toRawRect(currentRectDisplay);
        if (mode === 'front') {
            frontRect = raw;
            mode = 'back';
            instructionText.innerHTML = "✂️ Ab mouse se drag karke <b>BACK</b> card (address wala part) ke around box banayein";
        } else if (mode === 'back') {
            backRect = raw;
            mode = 'done';
            instructionText.innerHTML = "✅ Dono sides select ho gaye. Neeche <b>Generate &amp; Arrange</b> dabayein.";
            generateBtn.disabled = false;
        }
        currentRectDisplay = null;
        redrawCalibCanvas();
    }

    calibCanvas.addEventListener('mousedown', startDrag);
    calibCanvas.addEventListener('mousemove', moveDrag);
    calibCanvas.addEventListener('mouseup', endDrag);
    calibCanvas.addEventListener('mouseleave', () => { if (isDragging) endDrag(); });
    calibCanvas.addEventListener('touchstart', startDrag, { passive: false });
    calibCanvas.addEventListener('touchmove', moveDrag, { passive: false });
    calibCanvas.addEventListener('touchend', endDrag);

    function resetSelection() {
        frontRect = null;
        backRect = null;
        currentRectDisplay = null;
        isDragging = false;
        mode = 'front';
        generateBtn.disabled = true;
        previewArea.style.display = "none";
        printBtn.style.display = "none";
        instructionText.innerHTML = "✂️ Mouse se drag karke <b>FRONT</b> card (photo wala part) ke around box banayein";
        if (rawImageCanvas.width > 0) redrawCalibCanvas();
    }

    function drawFinalA4() {
        if (!frontRect || !backRect) {
            alert("Pehle FRONT aur BACK dono ka crop area select karein!");
            return;
        }

        // Clear A4 Canvas and make it white
        printCtx.fillStyle = "#FFFFFF";
        printCtx.fillRect(0, 0, A4_WIDTH, A4_HEIGHT);

        // 🔥 FIXED "STRETCH-TO-FILL" SIZE 🔥
        // Forces the image to exactly match the standard 85x54mm ID card size
        const targetW = 1004; 
        const targetH = 638;  // Fixed height! This will stretch and completely fill the box.

        // Auto-center on A4
        const marginX = (A4_WIDTH - (targetW * 2)) / 2; 
        const marginY = 250; 

        try {
            // Draw Front Side (Left) - uses YOUR manually selected crop box
            printCtx.drawImage(
                rawImageCanvas,
                frontRect.x, frontRect.y, frontRect.w, frontRect.h,
                marginX, marginY, targetW, targetH
            );

            // Draw Back Side (Right) - uses YOUR manually selected crop box
            printCtx.drawImage(
                rawImageCanvas,
                backRect.x, backRect.y, backRect.w, backRect.h,
                marginX + targetW, marginY, targetW, targetH
            );

            // 🔥 Draw SOLID BLACK OUTSIDE BOX 🔥
            printCtx.strokeStyle = "#000000"; 
            printCtx.lineWidth = 4; // Thick solid line 
            printCtx.setLineDash([]); // No dashes
            printCtx.strokeRect(marginX, marginY, targetW * 2, targetH);
            
            // 🔥 Draw SOLID BLACK FOLDING LINE (Center Line) 🔥
            printCtx.lineWidth = 2; // Slightly thinner for the exact center fold
            printCtx.beginPath();
            printCtx.moveTo(marginX + targetW, marginY);
            printCtx.lineTo(marginX + targetW, marginY + targetH);
            printCtx.stroke();

            previewArea.style.display = "block";
            printBtn.style.display = "block";

        } catch (e) {
            console.error("Cropping boundary error.", e);
            alert("Crop error — dobara select karke try karein.");
        }
    }
</script>

</body>
</html>
