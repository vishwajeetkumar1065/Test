<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Select Payment Method</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .payment-container {
            max-width: 450px;
            margin: 40px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .amount-display {
            font-size: 26px;
            font-weight: bold;
            color: #1976d2;
            margin: 20px 0;
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border: 2px dashed #1976d2;
        }
        .pay-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .rzp-btn {
            color: white;
            background: #3399cc;
            box-shadow: 0 4px 12px rgba(51, 153, 204, 0.3);
        }
        .rzp-btn:hover {
            background: #287a9e;
        }
        .cash-btn {
            color: white;
            background-color: #28a745;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.25);
        }
        .cash-btn:hover {
            background-color: #218838;
        }
        .cancel-btn {
            color: #721c24;
            background-color: #f8d7da;
            box-shadow: none;
            border: 1px solid #f1b0b7;
            margin-bottom: 0;
        }
        .cancel-btn:hover {
            background-color: #f1b0b7;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>Select Payment Method</h2>
    <p style="color: #666; font-size: 14px;">Choose how you want to settle your printing tab balance parameters.</p>
    
    <div class="amount-display" id="priceDisplay">Amount to Pay: ₹0</div>

    <button class="pay-btn rzp-btn" onclick="openRazorpayCheckout(event)">💳 PAY ONLINE NOW</button>
    
    <button class="pay-btn cash-btn" onclick="processCashPayment(event)">💵 PAY WITH CASH AT COUNTER</button>

    <button class="pay-btn cancel-btn" onclick="cancelOrder(event)">✖ Cancel Order / Wrong File</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>
    // billingAmount is used for DISPLAY ONLY. The amount actually charged is
    // decided server-side by create-razorpay-order, which reads it fresh
    // from the `orders` row — editing localStorage no longer changes what
    // you pay.
    const billingAmount = localStorage.getItem("amount") || "0";
    const targetOrderId = localStorage.getItem("current_order_id");

    const client = window.supabase.createClient(window.SITE_CONFIG.SUPABASE_URL, window.SITE_CONFIG.SUPABASE_KEY);

    window.onload = function() {
        if (billingAmount === "0" || !targetOrderId) {
            window.location.href = "upload.html";
            return;
        }
        document.getElementById("priceDisplay").innerText = "Amount to Pay: ₹" + billingAmount;
    };

    // 🌐 OPTION 1: ONLINE GATEWAY ENGINE ROUTE
    async function openRazorpayCheckout(e) {
        e.preventDefault();

        const payBtn = e.target.closest("button");
        if (payBtn) { payBtn.disabled = true; payBtn.innerText = "Starting secure checkout..."; }

        // 1) Ask our server to open a Razorpay order for the REAL amount on file.
        let session;
        try {
            const { data, error } = await client.functions.invoke("create-razorpay-order", {
                body: { order_id: targetOrderId }
            });
            if (error || !data || data.error) throw new Error((data && data.error) || error?.message || "Could not start checkout");
            session = data;
        } catch (err) {
            alert("Could not start payment: " + err.message);
            if (payBtn) { payBtn.disabled = false; payBtn.innerText = "💳 PAY ONLINE NOW"; }
            return;
        }

        let settled = false;

        const options = {
            "key": session.key_id,
            "order_id": session.razorpay_order_id, // locks amount+currency server-side
            "amount": session.amount.toString(),
            "currency": session.currency,
            "name": window.SITE_CONFIG.STORE_NAME || "Digital Print Shop",
            "description": "Payment for Order #" + targetOrderId,
            "notes": { "current_order_id": targetOrderId },
            "modal": {
                "ondismiss": function() {
                    console.log("Checkout overlay sheets dismissed.");
                    if (payBtn) { payBtn.disabled = false; payBtn.innerText = "💳 PAY ONLINE NOW"; }
                }
            },
            // 2) Never trust this callback by itself — hand it to the server
            //    to verify the signature before treating the order as paid.
            "handler": async function (response) {
                if (settled) return;
                settled = true;

                const preventClose = (event) => {
                    event.preventDefault();
                    event.returnValue = "Verifying your payment...";
                };
                window.addEventListener("beforeunload", preventClose);

                try {
                    const { data, error } = await client.functions.invoke("verify-razorpay-payment", {
                        body: {
                            order_id: targetOrderId,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature
                        }
                    });
                    window.removeEventListener("beforeunload", preventClose);

                    if (error || !data || data.error || !data.success) {
                        alert("We couldn't verify your payment automatically. If money was deducted, please show this screen at the counter.");
                        if (payBtn) { payBtn.disabled = false; payBtn.innerText = "💳 PAY ONLINE NOW"; }
                        return;
                    }

                    localStorage.setItem("last_payment_method", "Razorpay Gateway");
                    localStorage.setItem("payment_id", response.razorpay_payment_id || "");
                    window.location.href = "success.html";
                } catch (err) {
                    window.removeEventListener("beforeunload", preventClose);
                    alert("We couldn't verify your payment automatically. If money was deducted, please show this screen at the counter.");
                    if (payBtn) { payBtn.disabled = false; payBtn.innerText = "💳 PAY ONLINE NOW"; }
                }
            },
            "theme": { "color": "#3399cc" }
        };

        const rzp = new Razorpay(options);
        rzp.open();
    }

    // 🏦 OPTION 2: CASH AT COUNTER BACKEND REGISTRATION FLOW
    async function processCashPayment(e) {
        e.preventDefault();
        try {
            await client.from("orders").update({ payment_status: "Cash Payment Pending" }).eq("id", targetOrderId);
        } catch (dbError) {}
        localStorage.setItem("last_payment_method", "Cash Counter");
        window.location.href = "cash.html";
    }

    // ✖ OPTION 3: CANCEL ORDER (wrong file / changed mind)
    async function cancelOrder(e) {
        e.preventDefault();
        if (!confirm("Cancel this order and start over? Your uploaded file will not be printed.")) return;

        try {
            await client.from("orders").update({ payment_status: "Cancelled" }).eq("id", targetOrderId);
        } catch (dbError) {
            console.error("Cancel update failed", dbError);
        }

        localStorage.removeItem("amount");
        localStorage.removeItem("mobile");
        localStorage.removeItem("current_order_id");
        localStorage.removeItem("printType");
        localStorage.removeItem("last_payment_method");
        localStorage.removeItem("payment_id");

        window.location.href = "index.html";
    }
</script>
</body>
</html>
